name: PR Checks

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'assets/**'
      - 'README.md'
      - '.github/CONTRIBUTING.md'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [app-backend, app-web, app-admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint --workspace=${{ matrix.project }}

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [app-backend, app-web, app-admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Type Check
        run: npm run type-check --workspace=${{ matrix.project }}

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [app-backend, app-web, app-admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Tests
        run: npm test --workspace=${{ matrix.project }} -- --coverage --watchAll=false
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.project }}
          path: ${{ matrix.project }}/coverage/

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [app-backend, app-web, app-admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Build
        run: npm run build --workspace=${{ matrix.project }}
