name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app-backend/**'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test --workspace=app-backend

  build-and-push:
    name: Build & Push to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/barcody-backend
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Auto-Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /var/www/barcody-barcode-scanner-for-anything/app-backend/.env << 'ENVEOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=production
            API_VERSION=v1
            LOG_LEVEL=info
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ANALYTICS_HASH_SECRET=${{ secrets.ANALYTICS_HASH_SECRET }}
            REDIS_TTL=3600
            REDIS_MAX=100
            GOOGLE_REDIRECT_URI=https://api-barcody.kaiofficial.xyz/api/v1/auth/google/callback
            ENVEOF
            cd /var/www/barcody-barcode-scanner-for-anything
            docker compose pull app-backend
            docker compose up -d --remove-orphans app-backend
