services:
  postgres:
    image: postgres:15-alpine
    container_name: barcody_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-barcody}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: barcody_redis
    # Enable RDB persistence: snapshot every 60 s if ≥1 key changed.
    # This keeps refresh tokens alive across `make restart` / `make up-*`.
    # A hard rebuild with `--force-recreate -V` still wipes the volume, so
    # a full clean-slate dev environment is still achievable on demand.
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  app-backend:
    build:
      context: .
      dockerfile: app-backend/Dockerfile
      target: runner
    container_name: barcody_backend
    ports:
      - '3002:3002'
    env_file:
      - ./app-backend/.env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_DATABASE:-barcody}
      REDIS_URL: redis://redis:6379
      PORT: 3002
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3002/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  app-web:
    build:
      context: .
      dockerfile: app-web/Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: barcody_web
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  app-admin:
    build:
      context: .
      dockerfile: app-admin/Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: barcody_admin
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
    depends_on:
      app-backend:
        condition: service_healthy
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  barcody-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
