services:
  postgres:
    image: postgres:15-alpine
    container_name: barcody_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-barcody}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: barcody_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    container_name: barcody_backend
    ports:
      - '3002:3002'
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_DATABASE:-barcody}
      REDIS_URL: redis://redis:6379
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3002/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web-app/Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: barcody_web
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  admin-dashboard:
    build:
      context: .
      dockerfile: admin-dashboard/Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: barcody_admin
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - barcody-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  ts-web:
    image: tailscale/tailscale:latest
    hostname: barcody
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/web.json
    volumes:
      - ./infra/tailscale/web.json:/config/web.json
      - ts_web_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    networks:
      - barcody-network
    restart: unless-stopped

  ts-admin:
    image: tailscale/tailscale:latest
    hostname: admin-barcody
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/admin.json
    volumes:
      - ./infra/tailscale/admin.json:/config/admin.json
      - ts_admin_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    networks:
      - barcody-network
    restart: unless-stopped

  ts-api:
    image: tailscale/tailscale:latest
    hostname: api-barcody
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/api.json
    volumes:
      - ./infra/tailscale/api.json:/config/api.json
      - ts_api_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    networks:
      - barcody-network
    restart: unless-stopped

networks:
  barcody-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ts_web_state:
  ts_admin_state:
  ts_api_state:
